<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credenciales Softbol — Ink Sport</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a2e; font-family:Arial,sans-serif; min-height:100vh; padding:20px; }
  .header { text-align:center; margin-bottom:24px; }
  .header h1 { color:#fff; font-size:20px; margin-bottom:4px; }
  .header p { color:#aaa; font-size:13px; }
  .panel { background:#fff; border-radius:12px; padding:20px; max-width:480px; margin:0 auto 20px; box-shadow:0 4px 20px rgba(0,0,0,0.4); }
  .panel h2 { font-size:15px; color:#333; margin-bottom:16px; border-bottom:2px solid #e63946; padding-bottom:8px; }
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:12px; font-weight:bold; color:#555; margin-bottom:5px; text-transform:uppercase; }
  .form-group input[type="text"] { width:100%; padding:10px 12px; border:1.5px solid #ddd; border-radius:7px; font-size:14px; outline:none; }
  .form-group input[type="text"]:focus { border-color:#e63946; }
  .foto-upload { border:2px dashed #ccc; border-radius:8px; padding:16px; text-align:center; cursor:pointer; background:#fafafa; }
  .foto-upload input { display:none; }
  .foto-upload .icon { font-size:28px; margin-bottom:6px; }
  .foto-upload .txt { font-size:13px; color:#888; }
  .foto-upload .preview { width:80px; height:100px; object-fit:cover; object-position:center top; border-radius:6px; margin:0 auto 6px; display:none; border:2px solid #e63946; }
  .datos-fijos { background:#f5f5f5; border-radius:8px; padding:10px 14px; margin-bottom:14px; font-size:12px; color:#666; line-height:1.8; }
  .datos-fijos span { font-weight:bold; color:#333; }
  .btn-agregar { width:100%; padding:12px; background:#e63946; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:bold; cursor:pointer; }
  .acciones { max-width:480px; margin:0 auto 16px; display:flex; gap:10px; }
  .btn-imprimir { flex:1; padding:11px; background:#2d6a4f; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:bold; cursor:pointer; }
  .btn-limpiar  { flex:1; padding:11px; background:#555; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:bold; cursor:pointer; }
  .contador { text-align:center; color:#aaa; font-size:13px; margin-bottom:12px; }
  .contador span { color:#e63946; font-weight:bold; font-size:16px; }
  .guardado-badge { text-align:center; color:#4caf50; font-size:12px; margin-bottom:16px; opacity:0; transition:opacity 0.4s; height:18px; }
  .guardado-badge.visible { opacity:1; }
  .hoja-wrap { max-width:800px; margin:0 auto 24px; position:relative; }
  .hoja-wrap canvas { width:100%; display:block; box-shadow:0 2px 20px rgba(0,0,0,0.5); }
  .del-btns { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  .btn-del { position:absolute; background:rgba(230,57,70,0.9); color:#fff; border:none; border-radius:50%; width:24px; height:24px; font-size:13px; font-weight:bold; cursor:pointer; pointer-events:all; display:flex; align-items:center; justify-content:center; transform:translate(-50%,-50%); }
  @media print {
    body { background:white; padding:0; }
    .panel,.acciones,.header,.contador,.guardado-badge,.btn-del { display:none !important; }
    .hoja-wrap { max-width:none; margin:0; page-break-after:always; }
    .hoja-wrap canvas { width:210mm; }
  }
</style>
</head>

<div class="header">
  <h1>⚾ Credenciales Softbol Sabatino 2025</h1>
  <p>Equipo: Ink Sport &nbsp;|&nbsp; Categoría: 3C &nbsp;|&nbsp; Rama: Varonil</p>
</div>
<div class="panel">

    Torneo: <span>Sabatino</span> &nbsp;·&nbsp; Rama: <span>Varonil</span>
  </div>
  <div class="form-group">
    <label>Nombre del Jugador</label>
    <input type="text" id="inp-nombre" placeholder="Ej. Juan Pérez González"/>
  </div>
  <div class="form-group">
    <label>Foto del Jugador</label>

      <div id="foto-icon" class="icon">📷</div>
      <div id="foto-txt" class="txt">Toca para seleccionar foto</div>
    </div>
  </div>
  <button class="btn-agregar" onclick="agregarJugador()">Agregar a la Credencial</button>
</div>
<div class="acciones">
  <button class="btn-imprimir" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
  <button class="btn-limpiar" onclick="sincronizar()" style="flex:0 0 60px;background:#1d4e89">☁️</button>
  <button class="btn-limpiar" onclick="limpiarTodo()">🗑️ Limpiar Todo</button>
</div>
<div class="contador">Jugadores registrados: <span id="conteo">0</span></div>

<div id="hojas-container"></div>

// Cargar una imagen y devolver Promise
function cargarImagen(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

async function dibujarHoja(canvas, slice) {
  canvas.width  = TMPL_W;
  canvas.height = TMPL_H;
  const ctx = canvas.getContext('2d');

  // 1. Dibujar plantilla
  ctx.drawImage(tmplImg, 0, 0, TMPL_W, TMPL_H);

  // 2. Cargar TODAS las fotos primero (en paralelo)
  const fotos = await Promise.all(slice.map(j => j ? cargarImagen(j.foto) : Promise.resolve(null)));

  // 3. Dibujar cada tarjeta con su foto ya cargada
  slice.forEach((j, s) => {
    if (!j) return;

    // Offset exacto de este slot (coordenadas absolutas por slot)
    const ox = SLOTS[s].ox;
    const oy = SLOTS[s].oy;

    // Texto
    ctx.font = `bold 13px Arial`;
    ctx.fillStyle = '#000';
    const maxTW = PHOTO.x - TEXT_X - 5;
    const valores = [j.nombre, 'Ink Sport', '3C', 'Sabatino', 'Varonil'];
    LINES.forEach((ly, i) => {
      ctx.fillText(valores[i], ox + TEXT_X, oy + ly, maxTW);
    });

    // Foto
    const fImg = fotos[s];
    if (!fImg) return;
    const scale = Math.max(PHOTO.w / fImg.width, PHOTO.h / fImg.height);
    const srcW  = PHOTO.w / scale;
    const srcH  = PHOTO.h / scale;
    const srcX  = (fImg.width - srcW) / 2;
    const srcY  = 0;
    ctx.drawImage(fImg, srcX, srcY, srcW, srcH, ox + PHOTO.x, oy + PHOTO.y, PHOTO.w, PHOTO.h);
  });
}

async function renderTodo() {
  if (!tmplLista) return;
  const container = document.getElementById('hojas-container');
  container.innerHTML = '';
  const totalHojas = Math.max(1, Math.ceil(jugadores.length / 8));

  for (let h = 0; h < totalHojas; h++) {
    const slice = jugadores.slice(h*8, h*8+8);
    while (slice.length < 8) slice.push(null);

    const wrap = document.createElement('div');
    wrap.className = 'hoja-wrap';

    const canvas = document.createElement('canvas');
    await dibujarHoja(canvas, slice);
    wrap.appendChild(canvas);

    // Botones eliminar
    const delLayer = document.createElement('div');
    delLayer.className = 'del-btns';
    slice.forEach((j, s) => {
      if (!j) return;
      const ox = SLOTS[s].ox;
      const oy = SLOTS[s].oy;
      const globalIdx = h*8 + s;
      const btn = document.createElement('button');
      btn.className = 'btn-del';
      btn.textContent = '✕';
      btn.style.left = ((ox + CARD_W) / TMPL_W * 100).toFixed(2) + '%';
      btn.style.top  = (oy / TMPL_H * 100).toFixed(2) + '%';
      btn.onclick = () => eliminarJugador(globalIdx);
      delLayer.appendChild(btn);
    });
    wrap.appendChild(delLayer);
    container.appendChild(wrap);
  }
}

/* =================== NUBE (Google Apps Script) =================== */
const isCloud = () => !!(CLOUD_URL && CLOUD_URL.trim());

function setBadge(text, color) {
  const b = document.getElementById('guardado-badge');
  b.textContent = text;
  b.style.color = color || '#4caf50';
  b.classList.add('visible');
  clearTimeout(b._t);
  b._t = setTimeout(() => b.classList.remove('visible'), 2500);
}

async function cloudFetch(payload) {
  const res = await fetch(CLOUD_URL, { method: 'POST', body: JSON.stringify(payload) });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function cloudGet() {
  const res = await fetch(CLOUD_URL);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function sincronizar() {
  if (!isCloud()) return;
  try {
    const data = await cloudGet();
    if (Array.isArray(data.jugadores)) {
      jugadores = data.jugadores;
      renderTodo();
      actualizarConteo();
    }
  } catch (e) {
    setBadge('⚠️ Sin conexión a la nube', '#e63946');
  }
}

/* =================== ACCIONES =================== */
async function agregarJugador() {
  const nombre = document.getElementById('inp-nombre').value.trim();
  if (!nombre) { alert('Escribe el nombre del jugador.'); return; }
  if (!fotoDataUrl) { alert('Selecciona una foto.'); return; }
  const jugador = {
    id: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random()),
    nombre, foto: fotoDataUrl,
  };
  if (isCloud()) {
    try {
      setBadge('⏳ Guardando en la nube...', '#888');
      const data = await cloudFetch({ action: 'add', jugador });
      jugadores = data.jugadores || [];
      setBadge('☁️ Guardado en la nube');
    } catch (e) {
      setBadge('⚠️ Sin conexión: guardado solo local', '#e63946');
      jugadores.push(jugador);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(jugadores));
    }
  } else {
    jugadores.push(jugador);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(jugadores));
    setBadge('✅ Guardado en este dispositivo');
  }
  renderTodo(); actualizarConteo(); limpiarForm();
}

async function eliminarJugador(idx) {
  const j = jugadores[idx];
  if (!j || !confirm('¿Eliminar a ' + j.nombre + '?')) return;
  if (isCloud() && j.id) {
    try {
      setBadge('⏳ Borrando en la nube...', '#888');
      const data = await cloudFetch({ action: 'delete', id: j.id });
      jugadores = data.jugadores || [];
      setBadge('☁️ Sincronizado');
    } catch (e) {
      setBadge('⚠️ Sin conexión: borrado solo local', '#e63946');
      jugadores.splice(idx, 1);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(jugadores));
    }
  } else {
    jugadores.splice(idx, 1);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(jugadores));
  }
  renderTodo(); actualizarConteo();
}

function guardar() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(jugadores));
  setBadge(isCloud() ? '☁️ Guardado en la nube' : '✅ Guardado en este dispositivo');
}

function actualizarConteo() {
  document.getElementById('conteo').textContent = jugadores.length;
}

function limpiarForm() {
  document.getElementById('inp-nombre').value = '';
  fotoDataUrl = null;
  document.getElementById('inp-foto').value = '';
  document.getElementById('foto-preview').style.display = 'none';
  document.getElementById('foto-icon').style.display = 'block';
  document.getElementById('foto-txt').textContent = 'Toca para seleccionar foto';
}

async function limpiarTodo() {
  if (!confirm('¿Eliminar TODOS los jugadores?')) return;
  if (isCloud()) {
    try {
      setBadge('⏳ Limpiando nube...', '#888');
      const data = await cloudFetch({ action: 'clear' });
      jugadores = data.jugadores || [];
      setBadge('☁️ Lista vaciada en la nube');
    } catch (e) {
      setBadge('⚠️ Sin conexión a la nube', '#e63946');
      return;
    }
  } else {
    jugadores = [];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(jugadores));
  }
  renderTodo(); actualizarConteo(); limpiarForm();
}

function redimensionar(dataUrl, callback) {
  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement('canvas');
    const maxW = 400, maxH = 600;
    let w = img.width, h = img.height;
    let sy = 0, sh = h;
    if (h > w * 1.8) { sy = Math.round(h*0.12); sh = Math.round(h*0.65); }
    const ratio = Math.min(maxW/w, maxH/sh);
    canvas.width  = Math.round(w * ratio);
    canvas.height = Math.round(sh * ratio);
    canvas.getContext('2d').drawImage(img, 0, sy, w, sh, 0, 0, canvas.width, canvas.height);
    callback(canvas.toDataURL('image/jpeg', 0.88));
  };
  img.src = dataUrl;
}

function previewFoto(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => redimensionar(e.target.result, resized => {
    fotoDataUrl = resized;
    const prev = document.getElementById('foto-preview');
    prev.src = fotoDataUrl; prev.style.display = 'block';
    document.getElementById('foto-icon').style.display = 'none';
    document.getElementById('foto-txt').textContent = '✅ Foto lista';
  });
  reader.readAsDataURL(input.files[0]);
}

async function init() {
  if (isCloud()) {
    setBadge('☁️ Conectando con la nube...', '#888');
    try {
      const data = await cloudGet();
      jugadores = Array.isArray(data.jugadores) ? data.jugadores : [];
      const saved = localStorage.getItem(STORAGE_KEY);
      const migrado = localStorage.getItem(STORAGE_KEY + '_migrado');
      if (!migrado && saved && jugadores.length === 0) {
        try {
          const local = JSON.parse(saved);
          if (Array.isArray(local) && local.length) {
            const data2 = await cloudFetch({ action: 'replace', jugadores: local });
            jugadores = data2.jugadores || [];
            setBadge('☁️ Datos locales subidos a la nube');
          }
        } catch (e) {}
      }
      localStorage.setItem(STORAGE_KEY + '_migrado', '1');
      setBadge('☁️ Conectado a la nube');
      if (syncTimer) clearInterval(syncTimer);
      syncTimer = setInterval(sincronizar, SYNC_MS);
    } catch (e) {
      setBadge('⚠️ Sin conexión - usando modo local', '#e63946');
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) { try { jugadores = JSON.parse(saved); } catch(e) {} }
    }
  } else {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { try { jugadores = JSON.parse(saved); } catch(e) {} }
  }
  actualizarConteo();
  if (tmplLista) renderTodo();
}

init();
</script>
